<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Волшебный тест</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>


<div class="card" id="app">
    <!-- ЭКРАН ПРИВЕТСТВИЯ -->
    <div id="welcomeScreen">
        <h2 class="welcome-title">✨ Добро пожаловать ✨</h2>
        <p class="welcome-text">
            Пройдите увлекательный тест из 3 вопросов.<br>
            Узнайте интересный результат и статистику ваших ответов.
        </p>
        <button class="btn-primary" id="startBtn" style="width: 100%;">Начать тест →</button>
    </div>

    <!-- ЭКРАН ТЕСТА -->
    <div id="testScreen" class="hidden">
        <div class="progress" id="progressIndicator">Вопрос 1 / 3</div>
        <div class="question-text" id="questionText"></div>
        <div class="options-list" id="optionsContainer"></div>
        <div class="nav-buttons">
            <button class="btn-secondary" id="backBtn" disabled>← Назад</button>
            <button class="btn-primary" id="nextBtn">Далее →</button>
        </div>
    </div>
</div>

<!-- ОТДЕЛЬНАЯ СТРАНИЦА РЕЗУЛЬТАТОВ -->
<div id="resultPage" class="card result-card" style="display: none;">
    <div class="result-box">
        <h2>📊 Результаты теста</h2>
        <div id="resultUserInfo" class="user-info-badge"></div>
        <div class="result-text" id="resultMessage"></div>
        
        <div class="statistics" id="statisticsContainer"></div>
        
        <div class="result-buttons">
            <button class="btn-secondary" id="newTestBtn">🔄 Пройти заново</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
