<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Волшебный тест</title>
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/welcome.css" />
    <link rel="stylesheet" href="styles/test.css" />
    <link rel="stylesheet" href="styles/modal.css" />
    <link rel="stylesheet" href="styles/result.css" />
  </head>
  <body>
    <!-- Фоновые слои для анимации -->
    <div class="background-layer" id="backgroundLayer"></div>
    <div class="overlay-layer" id="overlayLayer"></div>

    <!-- Контент -->
    <div class="content-layer" id="contentLayer">
      <div class="welcome-screen no-card" id="welcomeScreen">
        <h2 class="welcome-title">Добро пожаловать</h2>
        <div class="welcome-hint" id="welcomeHint">
          Нажмите в любом месте, чтобы продолжить
        </div>
      </div>

      <!-- ЭКРАН ТЕСТА (скрыт изначально) -->
      <div id="testScreen" class="hidden card">
        <div class="deco-img deco-bottom-left"></div>
        <div class="progress" id="progressIndicator">Вопрос 1 / 3</div>
        <div class="question-text" id="questionText"></div>
        <div class="options-list" id="optionsContainer"></div>
        <div class="nav-buttons">
          <button class="btn-secondary" id="backBtn" disabled>← Назад</button>
          <button class="btn-primary" id="nextBtn">Далее →</button>
        </div>
      </div>

      <!-- ОТДЕЛЬНАЯ СТРАНИЦА РЕЗУЛЬТАТОВ -->
      <div id="resultPage" class="card" style="display: none">
        <div class="garland-container">
          <img src="images/Girlynda.png" alt="garland" class="garland" />
          <img src="images/Girlynda.png" alt="garland" class="garland" />
        </div>

        <!-- Динамический заголовок -->
        <div id="resultUserInfo" class="user-info-badge"></div>

        <!-- Обёртка для разделения экрана (текст слева/центр, картинки справа/по бокам) -->
        <div class="result-split">
          <div id="resultMessage" class="result-text"></div>
          <img id="resultImage" style="display: none" />
          <img id="resultImage2" style="display: none" />
        </div>

        <!-- Статистика и кнопки остаются внизу, как были -->
        <div id="statisticsContainer" class="statistics"></div>
        <div id="resultButtons" class="result-buttons">
          <button id="newTestBtn" class="btn-primary">Пройти заново</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>

    <script>
      // Запускаем анимацию при загрузке страницы
      window.addEventListener("load", () => {
        setTimeout(() => {
          document.getElementById("overlayLayer").classList.add("active");
          document.getElementById("contentLayer").classList.add("active");
        }, 100);
      });
    </script>
  </body>
</html>
